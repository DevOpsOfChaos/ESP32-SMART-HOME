# ============================================================
# SmartHome Server – Docker Compose Beispiel
# ============================================================
# Öffentliche Vorlage.
# Lokale docker-compose.yml daraus erzeugen und anpassen.
# Echte Passwörter und Pfade niemals committen.
#
# Dienste:
#   mosquitto  - MQTT-Broker (Port 1883)
#   nodered    - Node-RED Automatisierung (Port 1880)
#
# Verwendung:
#   cp docker-compose.example.yml docker-compose.yml
#   .env aus .env.example erstellen und befüllen
#   docker compose up -d
# ============================================================

version: "3.9"

services:

  # MQTT-Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smarthome_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # Node-RED Automatisierung und Dashboard
  nodered:
    image: nodered/node-red:latest
    container_name: smarthome_nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    env_file:
      - .env
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto

# Volumes für persistente Daten.
# Echte Datenpfade konfigurieren oder benannte Docker-Volumes nutzen.
volumes:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
