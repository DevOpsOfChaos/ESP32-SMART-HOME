# ============================================================
# Mosquitto MQTT Broker – Beispielkonfiguration
# ============================================================
# Öffentliche Vorlage. Lokale mosquitto.conf daraus erzeugen.
# Passwortdatei und Echtwerte niemals committen.
#
# Verwendung:
#   cp mosquitto.example.conf mosquitto.conf
# ============================================================

listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwd

log_type all
log_dest stdout

persistence true
persistence_location /mosquitto/data/

message_size_limit 65536
