# SmartHome Server V1
# Repo-Default bleibt absichtlich ohne lokale Secrets startbar.
# Lokale Auth-Haertung wird ueber den ignorierten Ordner /mosquitto/config/local aktiviert.

listener 1883
protocol mqtt

allow_anonymous true

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

retain_available true
max_packet_size 65536

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

include_dir /mosquitto/config/local
